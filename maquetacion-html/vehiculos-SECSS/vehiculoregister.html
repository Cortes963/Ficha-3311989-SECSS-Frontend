<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro de Usuario y Vehículo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="vehiculos.css">
</head>
<body>

     <header class="header-secss py-3">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <div class="logo-container d-flex align-items-center gap-3">
            <img src="https://www.seekpng.com/png/detail/859-8594947_simbolo-del-sena-png.png" alt="Logo SENA" class="logo">
                <div>
                    <h1 class="m-0 h4 text-white font-weight-bold">SECSS</h1>
                    <small class="text-light">Sistema de Gestión y Control Tecnológico | CEET</small>
                </div>
            </div>
            <div class="header-meta text-md-end text-center mt-2 mt-md-0 text-white-50">
                <small>Centro de Electricidad, Electrónica y Telecomunicaciones</small>
            </div>
        </div>
    </header>


    <main class="container my-5">
        <div class="card card-registro shadow-lg border-0">
            
            <div class="card-header text-center p-4">
                <h2 class="fw-bold m-0">Registro de Vehículos</h2>
                <p class="text-muted mb-0">Complete la información del vehículo</p>
            </div>
            
            <div class="card-body p-4">
                <form action="#" method="POST" enctype="multipart/form-data">
                    
                    <div class="row g-4">
                        
                        <div class="col-lg-6 pe-lg-4 border-end-lg">
                            <h4 class="section-title mb-4">Datos del Propietario</h4>
                            
                            <div class="row g-2 mb-3"> 
                                <div class="col-md-4">
                                    <label class="form-label">Tipo Doc.</label>
                                    <select class="form-select"> 
                                        <option value="CC">C.C.</option>
                                        <option value="TI">T.I.</option>
                                        <option value="CE">C.E.</option>
                                    </select>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label">Número de Documento</label>
                                    <input type="number" class="form-control" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Centro de Formación</label>
                                <input type="text" class="form-control" placeholder="Nombre del centro">
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Rol</label>
                                    <select class="form-select">
                                        <option value="aprendiz">Aprendiz</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Número de Ficha</label>
                                    <input type="number" class="form-control">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Dirección</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Teléfono / Celular</label>
                                <input type="tel" class="form-control">
                            </div>

                            <div class="file-upload-section p-3 mb-3 border rounded">
                                <p class="small fw-bold text-muted text-uppercase">Documentación Personal</p>
                                
                                <label class="form-label small">Documento Identidad (JPG)</label>
                                <input type="file" class="form-control form-control-sm mb-2" accept=".jpg, .jpeg">
                                
                                <label class="form-label small">Copia de Carnet aprendiz</label>
                                <input type="file" class="form-control form-control-sm mb-2">
                                
                                <label class="form-label small">Foto del Aprendiz (A color)</label>
                                <input type="file" class="form-control form-control-sm">
                            </div>
                        </div>

                        <div class="col-lg-6 ps-lg-4 mt-4 mt-lg-0">
                            <h4 class="section-title mb-4">Datos del Vehículo</h4>

                            <div class="mb-3">
                                <label class="form-label">Tipo de Vehículo</label>
                                <select class="form-select">
                                    <option value="moto">Motocicleta</option>
                                    <option value="bici">Bicicleta</option>
                                </select>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Placa</label>
                                    <input type="text" class="form-control" placeholder="ABC-123">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Cilindraje</label>
                                    <input type="text" class="form-control" placeholder="Ej: 150cc">
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Marca</label>
                                    <input type="text" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Modelo</label>
                                    <input type="text" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Color</label>
                                    <input type="text" class="form-control">
                                </div>
                            </div>

                            <div class="file-upload-section-v p-3 border rounded">
                                <p class="small fw-bold text-muted text-uppercase">Evidencia Visual del Vehículo</p>
                                
                                <label class="form-label small">Foto de la Placa (JPG)</label>
                                <input type="file" class="form-control form-control-sm mb-2" accept=".jpg, .jpeg">

                                <label class="form-label small">Foto Frontal Vehiculo</label>
                                <input type="file" class="form-control form-control-sm mb-2">

                                <label class="form-label small">Foto Lateral Vehiculo</label>
                                <input type="file" class="form-control form-control-sm mb-2">

                                <label class="form-label small">Tarjeta de Propiedad</label>
                                <input type="file" class="form-control form-control-sm">
                            </div>
                        </div>

                    </div> <div class="text-center mt-5">
                        <button type="submit" class="btn btn-primary btn-submit px-5 py-2">GUARDAR</button>
                    </div>

                </form>
            </div> </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
