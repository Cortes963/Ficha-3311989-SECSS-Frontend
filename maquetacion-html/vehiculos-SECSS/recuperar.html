<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>

    <link rel="stylesheet" href="style-recuperar.css">
</head>
<body>

    <div class="recovery-container">

        <h2>Recuperar Contraseña</h2>

        <p>
            Ingresa tu correo electrónico para recuperar tu cuenta.
        </p>

        <form onsubmit="enviarRecuperacion(event)">

            <div class="input-group">
                <label for="correo">
                    Correo Electrónico
                </label>

                <input
                    type="email"
                    id="correo"
                    placeholder="ejemplo@correo.com"
                    required>
            </div>

            <button type="submit" class="btn-recuperar">
                Enviar Código
            </button>

        </form>

        <div class="volver-login">
            <a href="login.html">
                Volver al inicio de sesión
            </a>
        </div>

    </div>

    <script>
        function enviarRecuperacion(event){

            event.preventDefault();

            let correo =
            document.getElementById("correo").value;

            alert(
                "Código enviado a: " + correo
            );

            window.location.href = "codigo.html";
        }
    </script>

</body>
</html>
